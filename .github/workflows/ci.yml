name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - back-estruturado

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  alerts-tests:
    name: plus-ms-alerts tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plus-ms-alerts
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: plus-ms-alerts/package-lock.json

      - name: Install
        run: npm ci

      - name: Unit tests
        run: npm run test:unit

      - name: Integration tests
        run: npm run test:integration

      - name: Contract tests
        run: npm run test:contract

      - name: Functional tests
        run: npm run test:functional

      - name: Coverage gate
        run: npm run coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: plus-ms-alerts-coverage
          path: plus-ms-alerts/coverage
          if-no-files-found: error

  frontend-builds:
    name: plus-mfe-alerts build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plus-mfe-alerts
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: plus-mfe-alerts/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

  docker-builds:
    name: alertas docker build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: plus-ms-alerts
            context: plus-ms-alerts
          - image: plus-mfe-alerts
            context: plus-mfe-alerts
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: false
          tags: local/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  alertas-compose:
    name: alertas compose smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Start reproducible test stack
        run: docker compose -f docker-compose.test.yml up -d --build

      - name: Wait for APIs
        run: |
          for i in {1..60}; do
            curl -fsS http://localhost:4566/_localstack/health >/dev/null &&
            curl -fsS http://localhost:3005/health >/dev/null &&
            exit 0
            sleep 2
          done
          docker compose -f docker-compose.test.yml logs
          exit 1

      - name: Check MongoDB
        run: | 
          docker compose -f docker-compose.test.yml exec -T mongo-alertas-test mongosh --quiet --eval "db.runCommand({ ping: 1 }).ok"

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.test.yml down -v
