name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dockerhub:
    name: publish Docker Hub images
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: plus-ms-alerts
            context: plus-ms-alerts
          - image: plus-mfe-alerts
            context: plus-mfe-alerts
          - image: plus-ms-estoque-fake
            context: plus-ms-estoque-fake
          - image: plus-ms-auth
            context: plus-ms-auth
    steps:
      - name: Checkout
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Skip without Docker Hub secrets
        if: env.DOCKERHUB_USERNAME == '' || env.DOCKERHUB_TOKEN == ''
        run: echo "Configure DOCKERHUB_USERNAME and DOCKERHUB_TOKEN to publish Docker images."

      - name: Set up Docker Buildx
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/setup-buildx-action@v3

      - name: Login Docker Hub
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ env.DOCKERHUB_USERNAME }}/${{ matrix.image }}
          tags: |
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  npm:
    name: publish NPM packages
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        package:
          - plus-ms-alerts
          - plus-mfe-alerts
          - plus-ms-estoque-fake
    defaults:
      run:
        working-directory: ${{ matrix.package }}
    steps:
      - name: Checkout
        if: env.NPM_TOKEN != ''
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Skip without NPM token
        if: env.NPM_TOKEN == ''
        run: echo "Configure NPM_TOKEN to publish NPM packages."

      - name: Setup Node
        if: env.NPM_TOKEN != ''
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: ${{ matrix.package }}/package-lock.json

      - name: Install
        if: env.NPM_TOKEN != ''
        run: npm ci

      - name: Build when available
        if: env.NPM_TOKEN != ''
        run: npm run build --if-present

      - name: Publish
        if: env.NPM_TOKEN != ''
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN }}
